# ── Observatorio de Arrecifes — México ──
# Archivo: /etc/nginx/http.d/cercu.conf (bloques arrecifes)
# Frontend: PM2 arrecifes en puerto 3007
# Backend:  PM2 cercu-backend en puerto 3003
#
# Pegar AMBOS bloques al final de cercu.conf, igual que el patrón de humedales.

server {
    server_name arrecifes.cercu.com.mx;

    # API proxy → cercu-backend
    location /api/ {
        proxy_pass http://127.0.0.1:3003/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend → Nuxt
    location / {
        proxy_pass http://127.0.0.1:3007;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/arrecifes.cercu.com.mx/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/arrecifes.cercu.com.mx/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}


server {
    if ($host = arrecifes.cercu.com.mx) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name arrecifes.cercu.com.mx;
    return 404; # managed by Certbot
}
